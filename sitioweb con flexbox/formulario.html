<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>la pagina del seba</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link rel="stylesheet" href="formulario.css">
  </head>


  <body>  
    <div class="container">
<h1>Formularios</h1>
<button class="nav-boton" onclick="accion()">MENU</button>
    <a href="turnero.html" class="nav-enlace desaparece">Inicio</a>
<form id="formulario" novalidate>
    <input 
    class="form-control mb-2"
    type="text"
    name="username"
    placeholder="Ingrese Nombre"
    autocomplete="off"
    id="username"
    required
    minlength="3"
    maxlength="10"
    pattern="^[A-Za-zÑñÁáÉéÍíÓóÚúÜü\s]+$"
    title="solo letras en el nombre"
    >
    <p class="text-danger mb-2 d-none"id="alertName"></p>

    <input 
    class="form-control mb-2"
    type="email"
    placeholder="Ingrese correo"
    name="useremail"
    id="useremail"
    autocomplete="off"
    required
    pattern="^[a-z0-9]+(\.[_a-z0-9]+)*@[a-z0-9-]+(\.[a-z0-9-]+)*(\.[a-z]{2,15})$"
    title="Ingresa un correo valido"
    >
    <p class="text-danger mb-2 d-none"id="alertEmail"></p>

    <button type="submit" class="btn btn-primary">Enviar</button>
</form>

<div class="alert alert-success my-2 d-none" id="Alertsuccess"></div>
    </div>
    <script src="formulario.js"></script>
  </body>
</html>
